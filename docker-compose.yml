# docker-compose.yml
# PostgreSQL pour 5S Excellence
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: 5s_excellence_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: 5s_excellence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # pgAdmin (optionnel — interface web de gestion)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: 5s_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@multiprint.cm
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
    driver: local
